<style>
  /* ─── Design Tokens ─────────────────────────────────────── */
  :root {
    --cream: #FBF1DE;
    --cream-2: #FCEAC8;
    --ink: #2C2016;
    --ink-soft: #6B5842;
    --red: #FF5A3C;
    --yellow: #FFC53A;
    --mint: #2FB783;
    --blue: #3B7DFF;
    --purple: #8B5CF6;
    --paper: #FFFCF5;
    --line: #E7D6B6;
    --shadow: rgba(44,32,22,0.14);
    --radius: 22px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--cream);

    background-image: radial-gradient(var(--line) 1px, transparent 1px);

  #root { position: relative; z-index: 1; }

  /* ─── Loader ────────────────────────────────────────────── */

  .nav-logo-chip {

  .nav-links { display: flex; gap: 22px; align-items: center; }

  /* ─── Hero ──────────────────────────────────────────────── */

  .hero-big {
    font-family: 'Fredoka', sans-serif; font-weight: 700;

  .hero-badges {
    position: absolute; right: 6vw; top: 50%; transform: translateY(-50%);

  }
  .hero-badge {
    background: var(--paper); border: 2px solid var(--ink); border-radius: 14px;

  }
  .hero-badge.accent { background: var(--red); color: var(--cream); }
  .hero-badge.accent span { color: rgba(255,255,255,0.85); }
  .hero-badge b { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 26px; display: block; }
  .hero-badge span { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ink-soft); letter-spacing: 0.08em; text-transform: uppercase; }
  .scroll-rail {
    position: absolute; bottom: 26px; left: 50%; transform: translateX(-50%);
    z-index: 5; display: flex; flex-direction: column; align-items: center; gap: 8px;
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.2em; color: var(--ink-soft);
  }
  .scroll-rail-bar { width: 2px; height: 40px; background: var(--line); border-radius: 2px; overflow: hidden; }
  .scroll-rail-fill {
    width: 100%; background: var(--red); border-radius: 2px;
    transform-origin: top; transform: scaleY(0); height: 100%;
  }

  /* ─── 3D Box ─────────────────────────────────────────────── */
  .scene {
    position: absolute; inset: 0;
    perspective: 1600px; perspective-origin: 50% 45%;
    pointer-events: none; z-index: 2;
  }
  .box3d {
    position: absolute; left: 50%; top: 50%;
    --bw: 300px; --bh: 420px; --bd: 126px;
    width: var(--bw); height: var(--bh);
    transform-style: preserve-3d;
    will-change: transform;
  }
  .face {
    position: absolute; backface-visibility: hidden;
    border-radius: 10px; overflow: hidden;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06);
  }
  .face.front, .face.back { width: var(--bw); height: var(--bh); left: 0; top: 0; }
  .face.front { transform: translateZ(calc(var(--bd) / 2)); }
  .face.back  { transform: rotateY(180deg) translateZ(calc(var(--bd) / 2)); }
  .face.right, .face.left { width: var(--bd); height: var(--bh); left: calc(var(--bw)/2 - var(--bd)/2); top: 0; }
  .face.right { transform: rotateY(90deg)  translateZ(calc(var(--bw) / 2)); }
  .face.left  { transform: rotateY(-90deg) translateZ(calc(var(--bw) / 2)); }
  .face.top, .face.bottom { width: var(--bw); height: var(--bd); left: 0; top: calc(var(--bh)/2 - var(--bd)/2); }
  .face.top    { transform: rotateX(90deg)  translateZ(calc(var(--bh) / 2)); }
  .face.bottom { transform: rotateX(-90deg) translateZ(calc(var(--bh) / 2)); }

  /* Front face */

  /* Side / Back / Top / Bottom faces */
  .bside {

  .box-floor {

  /* ─── Section Shared ─────────────────────────────────────── */
  .sec { padding: 100px 32px 120px; max-width: 1200px; margin: 0 auto; }
  .sec-tag {

<script>
// Loader animation
(function() {
  const bar = document.getElementById('loader-bar');
  const loader = document.getElementById('loader');
  const txt = document.getElementById('loader-txt');
  const msgs = ['warming up the stack…', 'installing dependencies…', 'compiling React…', 'pushing to prod…', 'done! 🚀'];
  let prog = 0, msgI = 0, interval;
  interval = setInterval(() => {
    prog = Math.min(prog + Math.random() * 18 + 6, 95);
    bar.style.width = prog + '%';
    const idx = Math.floor((prog / 100) * msgs.length);
    if (idx !== msgI && idx < msgs.length) { msgI = idx; txt.textContent = msgs[idx]; }
    if (prog >= 95) { clearInterval(interval); }
  }, 80);

  window.addEventListener('load', () => {
    bar.style.width = '100%';
    txt.textContent = msgs[msgs.length - 1];
    clearInterval(interval);
    setTimeout(() => { loader.classList.add('out'); }, 400);
  });
})();
</script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Three.js Particle Background ───────────────────────────
function initParticles(canvas) {
  if (!window.THREE || !canvas) return () => {};
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(70, canvas.offsetWidth / canvas.offsetHeight, 0.1, 1000);
  camera.position.z = 6;

  const COUNT = 100;
  const geometry = new THREE.BufferGeometry();
  const positions = new Float32Array(COUNT * 3);
  const velocities = [];
  for (let i = 0; i < COUNT; i++) {
    positions[i * 3]     = (Math.random() - 0.5) * 16;
    positions[i * 3 + 1] = (Math.random() - 0.5) * 10;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 4;
    velocities.push(
      (Math.random() - 0.5) * 0.003,
      (Math.random() - 0.5) * 0.002,
      0
    );
  }
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

  const material = new THREE.PointsMaterial({ color: 0xFF5A3C, size: 0.08, transparent: true, opacity: 0.55, sizeAttenuation: true });
  const points = new THREE.Points(geometry, material);
  scene.add(points);

  let mouse = { x: 0, y: 0 };
  const onMouseMove = (e) => {
    mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
    mouse.y = -(e.clientY / window.innerHeight - 0.5) * 2;
  };
  window.addEventListener('mousemove', onMouseMove, { passive: true });

  const onResize = () => {
    if (!canvas.parentElement) return;
    const w = canvas.parentElement.offsetWidth;
    const h = canvas.parentElement.offsetHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  };
  window.addEventListener('resize', onResize, { passive: true });
  onResize();

  let animId;
  const pos = geometry.attributes.position;
  const animate = () => {
    animId = requestAnimationFrame(animate);
    for (let i = 0; i < COUNT; i++) {
      pos.array[i * 3]     += velocities[i * 3];
      pos.array[i * 3 + 1] += velocities[i * 3 + 1];
      if (pos.array[i * 3] > 8)  pos.array[i * 3] = -8;
      if (pos.array[i * 3] < -8) pos.array[i * 3] = 8;
      if (pos.array[i * 3 + 1] > 5)  pos.array[i * 3 + 1] = -5;
      if (pos.array[i * 3 + 1] < -5) pos.array[i * 3 + 1] = 5;
    }
    pos.needsUpdate = true;
    points.rotation.x += (mouse.y * 0.08 - points.rotation.x) * 0.04;
    points.rotation.y += (mouse.x * 0.08 - points.rotation.y) * 0.04;
    renderer.render(scene, camera);
  };
  animate();

  return () => {
    cancelAnimationFrame(animId);
    window.removeEventListener('mousemove', onMouseMove);
    window.removeEventListener('resize', onResize);
    geometry.dispose();
    material.dispose();

function Box3D({ progress, dragRef }) {
  const boxRef = useRef(null);
  const stateRef = useRef({ rotY: -22, rotX: -8, dragY: 0 });

  useEffect(() => {
    let raf;
    const el = boxRef.current;
    const loop = () => {
      const s = stateRef.current;
      const tY = -22 + (progress.current * 340) + s.dragY;
      const tX = -8 + Math.sin(progress.current * Math.PI * 2) * 6;
      s.rotY += (tY - s.rotY) * 0.08;
      s.rotX += (tX - s.rotX) * 0.08;
      if (el) el.style.transform = `translate(-50%,-50%) rotateX(${s.rotX}deg) rotateY(${s.rotY}deg)`;
      raf = requestAnimationFrame(loop);
    };
    loop();
    return () => cancelAnimationFrame(raf);
  }, []);

  useEffect(() => {
    if (dragRef) dragRef.current = (dy) => { stateRef.current.dragY = dy; };
  }, []);

  return (
    <div className="scene" aria-hidden="true">

function Hero() {
  const wrapRef = useRef(null);
  const canvasRef = useRef(null);
  const progress = useRef(0);
  const dragSetter = useRef(null);
  const [stage, setStage] = useState(0);
  const drag = useRef({ active: false, startX: 0, val: 0 });
  const fillRef = useRef(null);

  useEffect(() => {
    const cleanup = initParticles(canvasRef.current);
    return cleanup;
  }, []);

  useEffect(() => {
    const onScroll = () => {
      const el = wrapRef.current;
      if (!el) return;
      const r = el.getBoundingClientRect();
      const total = r.height - window.innerHeight;
      const p = Math.min(1, Math.max(0, -r.top / total));
      progress.current = p;
      setStage(p < 0.34 ? 0 : p < 0.68 ? 1 : 2);
      if (fillRef.current) fillRef.current.style.transform = `scaleY(${p})`;
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  useEffect(() => {
    const onDown = (e) => { drag.current.active = true; drag.current.startX = e.clientX; };
    const onMove = (e) => {
      if (!drag.current.active) return;
      drag.current.val += (e.clientX - drag.current.startX) * 0.4;
      drag.current.startX = e.clientX;
      dragSetter.current && dragSetter.current(drag.current.val);
    };
    const onUp = () => { drag.current.active = false; };
    window.addEventListener('mousedown', onDown);
    window.addEventListener('mousemove', onMove, { passive: true });
    window.addEventListener('mouseup', onUp);
    return () => {
      window.removeEventListener('mousedown', onDown);
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
  }, []);

  const captions = [
    { kicker: 'Meet', big: 'Dipta Biswas.', sub: 'Senior Frontend Engineer — building web apps that are actually fast.', tag: 'SCROLL TO ROTATE →' },
    { kicker: 'Fully', big: 'loaded.', sub: 'React · TypeScript · TanStack · 5+ years of crunch.', tag: 'KEEP SCROLLING' },
    { kicker: 'Ships at', big: '60 fps.', sub: '60K-row tables, async in sync, zero jank.', tag: 'DIG IN ↓' },
  ];

  return (
    <section aria-label="Introduction" className="hero-wrap" ref={wrapRef}>
      <div className="hero-pin">
        <canvas id="three-canvas" ref={canvasRef} aria-hidden="true"></canvas>
        <div className="hero-bg-blob" aria-hidden="true"></div>

        <div className="hero-caption">
          {captions.map((c, i) => (
            <div
              key={i}
              className="hero-stage"
              aria-hidden={stage !== i}
              style={{
                position: i === 0 ? 'relative' : 'absolute',
                top: i === 0 ? 'auto' : 0,
                opacity: stage === i ? 1 : 0,
                transform: stage === i ? 'translateY(0)' : 'translateY(16px)',
                pointerEvents: stage === i ? 'auto' : 'none',
              }}
            >
              <p className="hero-kicker">{c.kicker}</p>
              <h1 className="hero-big">{c.big}</h1>
              <p className="hero-sub">{c.sub}</p>
              <span className="hero-tag">{c.tag}</span>
            </div>
          ))}
        </div>

        <Box3D progress={progress} dragRef={dragSetter} />

        <div className="hero-badges" aria-hidden="true">
          <div className="hero-badge accent" style={{transform:'rotate(3deg)'}}>
            <b>5+ yrs</b><span>shipping UIs</span>

    const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVis(true); }, { threshold: 0.15 });
    if (ref.current) o.observe(ref.current);
    return () => o.disconnect();
  }, []);

  const metrics = [
    { b: '60fps',  s: '60K-row virtual tables, zero jank',      emo: '⚡', cls: 'r' },
    { b: '0',      s: 'duplicate mutations after the fix',       emo: '🔁', cls: 'g' },
    { b: '~90%',   s: 'less manual ops work (Coveo search)',     emo: '📉', cls: 'b' },
    { b: '45%',    s: 'faster project setup (scaffold)',         emo: '🚀', cls: 'p' },
    { b: '60%',    s: 'faster real-estate app (caching)',        emo: '🏎️', cls: 'g' },
    { b: '5+ yrs', s: 'shipping production frontends',           emo: '📦', cls: 'r' },
  ];

  return (
    <section id="achievements" className="sec" ref={ref} aria-labelledby="achievements-heading">
      <div className="sec-tag" aria-hidden="true">Achievements</div>
      <h2 className="sec-head" id="achievements-heading">
        Some <em>medals</em> on the shelf.
      </h2>

      <button
        className="ac-award"
        onClick={() => { setClosing(false); setOpen(true); }}
        aria-label="View Outstanding Performance Award celebration — opens LinkedIn post"
      >
        <span className="ac-award-medal" aria-hidden="true">🏆</span>
        <div>
          <h3>Outstanding Performance Award</h3>
          <p>Recognized at CodeClouds for consistent delivery quality and measurable impact on team efficiency — including compressing the application into a ZIP for AWS Lambda deployment, making future development far easier.</p>
        </div>
        <span className="ac-award-yr">NOV 2023</span>
        <span className="ac-hint">
          <span className="ac-hint-in" aria-hidden="true">in</span>
          see the celebration post →
        </span>
      </button>

      <div className="ac-grid" role="list" aria-label="Impact metrics">
        {metrics.map((m, i) => (
          <div
            key={i} role="listitem"
            className={`ac-metric ${m.cls}${vis ? ' show' : ''}`}
            style={{ '--emo': `"${m.emo}"`, transitionDelay: `${i * 70}ms` }}
          >
            <b aria-label={m.b}>{m.b}</b>
            <span>{m.s}</span>
          </div>
        ))}
      </div>

      {open && (
        <div className={`acm${closing ? ' closing' : ''}`} role="dialog" aria-modal="true" aria-label="Outstanding Performance Award details">
          <div className="acm-bg" onClick={close} aria-hidden="true"></div>
          <div className="acm-panel">
            <div className="acm-bar">
              <span className="in" aria-hidden="true">in</span>
              <b>Celebrating the Outstanding Performance Award</b>
              <button className="acm-close" onClick={close} aria-label="Close achievement modal">✕</button>
            </div>
            <div className="acm-body">
              <div className="acm-left">
                {LINKEDIN_POST ? (
                  <iframe className="pjm-frame" src={LINKEDIN_POST} title="LinkedIn celebration post" frameBorder="0" allowFullScreen></iframe>
                ) : (
                  <div className="acm-fallback">
                    <span className="medal" aria-hidden="true">🎉</span>
                    <h3>Celebration post</h3>
                    <p>Paste your LinkedIn celebration post embed URL into <code>LINKEDIN_POST</code> in the source and the real post loads here.</p>
                    <a className="acm-go" href={LINKEDIN_PROFILE} target="_blank" rel="noopener noreferrer">
                      <span aria-hidden="true" style={{background:'#fff',color:'#0A66C2',width:18,height:18,borderRadius:4,display:'grid',placeItems:'center',fontWeight:700,fontSize:11}}>in</span>
                      Open LinkedIn ↗
                    </a>
                  </div>
                )}
              </div>
              <div className="acm-right">
                <span className="eyebrow">🏆 Nov 2023 · CodeClouds</span>
                <h3>Outstanding Performance Award</h3>
                <p>A milestone I'm genuinely proud of — recognition for <b>consistent delivery</b> and real, measurable impact on how the team shipped.</p>
                <div className="acm-pts">
                  <div className="acm-pt">Built a reusable scaffold that cut new-project setup time by <b>45%</b>.</div>
                  <div className="acm-pt">Mentored junior devs in React &amp; modern JavaScript.</div>
                  <div className="acm-pt">Raised the bar on code reviews and delivery quality.</div>
                </div>
                <p>Beyond the trophy, it's the kind of teamwork and momentum I love being part of — a reminder of why I do this work.</p>
                <a className="acm-go" href={LINKEDIN_PROFILE} target="_blank" rel="noopener noreferrer">
                  <span aria-hidden="true" style={{background:'#fff',color:'#0A66C2',width:18,height:18,borderRadius:4,display:'grid',placeItems:'center',fontWeight:700,fontSize:11}}>in</span>
                  View on LinkedIn ↗
                </a>
              </div>
            </div>
          </div>
        </div>
      )}
    </section>
  );
}
